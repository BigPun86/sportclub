<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#ffffff" />
  <rect x="40" y="40" width="1120" height="720" rx="24" fill="#f7f7fa" stroke="#e5e7eb" stroke-width="2" />

  <text x="80" y="100" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#e10073">
    VW Bus - Werbeflaechen Uebersicht (Skizze)
  </text>
  <text x="80" y="140" font-family="Arial, sans-serif" font-size="20" fill="#555">
    Einfache Darstellung, nicht massstabsgetreu
  </text>

  <!-- Side view -->
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222">Seitenansicht</text>
  <rect x="80" y="230" width="520" height="200" rx="24" fill="#ffffff" stroke="#d1d5db" stroke-width="2" />
  <rect x="100" y="260" width="420" height="120" rx="14" fill="#f3f4f6" stroke="#cbd5e1" />
  <rect x="120" y="275" width="220" height="90" rx="10" fill="#e5e7eb" stroke="#cbd5e1" />
  <rect x="360" y="275" width="140" height="90" rx="10" fill="#e5e7eb" stroke="#cbd5e1" />
  <rect x="140" y="300" width="260" height="50" rx="8" fill="#ffe5f2" stroke="#e10073" stroke-width="2" />
  <text x="150" y="333" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#e10073">Seitenflaeche</text>
  <circle cx="170" cy="410" r="22" fill="#111" />
  <circle cx="460" cy="410" r="22" fill="#111" />

  <!-- Rear view -->
  <text x="680" y="210" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222">Heckansicht</text>
  <rect x="680" y="230" width="220" height="200" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2" />
  <rect x="700" y="260" width="180" height="110" rx="12" fill="#f3f4f6" stroke="#cbd5e1" />
  <rect x="715" y="280" width="150" height="70" rx="8" fill="#ffe5f2" stroke="#e10073" stroke-width="2" />
  <text x="725" y="323" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#e10073">Heckflaeche</text>
  <circle cx="725" cy="420" r="18" fill="#111" />
  <circle cx="855" cy="420" r="18" fill="#111" />

  <!-- Front view -->
  <text x="80" y="500" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222">Frontansicht</text>
  <rect x="80" y="520" width="220" height="200" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2" />
  <rect x="100" y="550" width="180" height="80" rx="12" fill="#f3f4f6" stroke="#cbd5e1" />
  <rect x="120" y="640" width="140" height="40" rx="8" fill="#ffe5f2" stroke="#e10073" stroke-width="2" />
  <text x="130" y="666" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#e10073">Frontstreifen</text>
  <circle cx="120" cy="720" r="16" fill="#111" />
  <circle cx="260" cy="720" r="16" fill="#111" />

  <!-- Legend -->
  <rect x="680" y="520" width="420" height="200" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2" />
  <text x="700" y="560" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#222">Legende</text>
  <rect x="700" y="585" width="24" height="24" fill="#ffe5f2" stroke="#e10073" stroke-width="2" />
  <text x="735" y="603" font-family="Arial, sans-serif" font-size="16" fill="#444">Sponsoring-Flaeche</text>
  <rect x="700" y="625" width="24" height="24" fill="#e5e7eb" stroke="#cbd5e1" />
  <text x="735" y="643" font-family="Arial, sans-serif" font-size="16" fill="#444">Fenster / Fahrzeugbereich</text>
</svg>
